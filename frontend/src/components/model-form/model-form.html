<div class="form-page">
  <div class="form-card">
    <div class="form-header">
      <button class="back-btn" (click)="cancel()">← Back</button>
      <h2 class="form-title">{{ isEdit ? 'Edit Model' : 'Add New Model' }}</h2>
      <p class="form-subtitle">{{ isEdit ? 'Update vehicle model details' : 'Register a new vehicle model in the catalog' }}</p>
    </div>

    <div *ngIf="error" class="alert-error">{{ error }}</div>

    <form (ngSubmit)="save()" class="form-body">
      <div class="form-row">
        <div class="field">
          <label for="modelName">Model Name <span class="required">*</span></label>
          <input id="modelName" [(ngModel)]="model.modelName" name="modelName"
                 placeholder="e.g. Swift, Creta" required />
        </div>
        <div class="field">
          <label for="variant">Variant</label>
          <input id="variant" [(ngModel)]="model.variant" name="variant"
                 placeholder="e.g. ZXi, VXi+, Alpha" />
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label for="fuelType">Fuel Type <span class="required">*</span></label>
          <select id="fuelType" [(ngModel)]="model.fuelType" name="fuelType" required>
            <option *ngFor="let f of fuelTypes" [value]="f">{{ f }}</option>
          </select>
        </div>
        <div class="field">
          <label for="transmission">Transmission <span class="required">*</span></label>
          <select id="transmission" [(ngModel)]="model.transmission" name="transmission" required>
            <option *ngFor="let t of transmissions" [value]="t">{{ t }}</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label for="price">Ex-Showroom Price (₹) <span class="required">*</span></label>
          <input id="price" [(ngModel)]="model.exShowroomPrice" name="exShowroomPrice"
                 type="number" min="0" placeholder="e.g. 850000" required />
        </div>
        <div class="field">
          <label for="status">Status</label>
          <select id="status" [(ngModel)]="model.status" name="status">
            <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-cancel" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn btn-save" [disabled]="saving">
          <span *ngIf="saving" class="spinner-sm"></span>
          {{ saving ? 'Saving…' : (isEdit ? 'Update Model' : 'Create Model') }}
        </button>
      </div>
    </form>
  </div>
</div>
