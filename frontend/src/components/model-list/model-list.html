<div class="page-wrapper">
  <header class="page-header">
    <div class="header-left">
      <a routerLink="/hello" class="back-link">← Dashboard</a>
      <h1 class="page-title">Vehicle Models</h1>
      <span class="record-count">{{ models.length }} models</span>
    </div>
    <div class="header-actions">
      <button *ngIf="isAdmin()" routerLink="/models/add" class="btn btn-primary">+ Add Model</button>
      <button routerLink="/stock" *ngIf="role === 'ADMIN' || role === 'DEALER'" class="btn btn-secondary">Stock</button>
      <button (click)="logout()" class="btn btn-ghost">Sign out</button>
    </div>
  </header>

  <div *ngIf="error" class="alert-error">{{ error }}</div>

  <div *ngIf="loading" class="state-loading">
    <div class="spinner"></div>
    <p>Loading models…</p>
  </div>

  <div *ngIf="!loading && !error" class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>Model / Variant</th>
          <th>Fuel</th>
          <th>Transmission</th>
          <th>Ex-Showroom Price</th>
          <th>Status</th>
          <th *ngIf="isAdmin()">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let m of models" class="table-row">
          <td class="model-cell">
            <span class="model-name">{{ m.modelName }}</span>
            <span class="model-variant">{{ m.variant }}</span>
          </td>
          <td><span class="badge" [ngClass]="fuelBadgeClass(m.fuelType)">{{ m.fuelType }}</span></td>
          <td>{{ m.transmission }}</td>
          <td class="price-cell">₹{{ m.exShowroomPrice | number:'1.0-0' }}</td>
          <td><span class="badge" [ngClass]="statusBadgeClass(m.status ?? '')">{{ m.status }}</span></td>
          <td *ngIf="isAdmin()" class="actions-cell">
            <button [routerLink]="['/models/edit', m.modelId]" class="btn-action btn-edit">Edit</button>
            <button (click)="delete(m.modelId!)" class="btn-action btn-delete">Delete</button>
          </td>
        </tr>
        <tr *ngIf="models.length === 0">
          <td [attr.colspan]="isAdmin() ? 6 : 5" class="empty-state">No models found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
