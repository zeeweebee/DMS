<div class="dashboard">

  <!-- Top nav -->
  <header class="nav">
    <div class="nav-brand">
      <span class="nav-logo">🚗</span>
      <span class="nav-name">DMS</span>
    </div>
    <div class="nav-right">
      <div class="nav-role">{{ role }}</div>
      <button (click)="logout()" class="btn-signout">Sign out</button>
    </div>
  </header>

  <main class="main">

    <!-- Hero -->
    <section class="hero">
      <div class="hero-text">
        <h1 class="hero-heading">Welcome back<span class="dot">.</span></h1>
        <p class="hero-sub">Here's an overview of your workspace.</p>
      </div>
    </section>

    <!-- Module cards -->
    <section class="modules">
      <h2 class="section-label">Modules</h2>
      <div class="module-grid">
        <a *ngFor="let m of visibleModules"
           [routerLink]="m.link"
           class="module-card"
           [style.--card-color]="m.color">
          <div class="card-top">
            <span class="card-icon">{{ m.icon }}</span>
            <span class="card-arrow">↗</span>
          </div>
          <div class="card-name">{{ m.name }}</div>
          <div class="card-desc">{{ m.desc }}</div>
        </a>
      </div>
    </section>

  </main>
</div>
